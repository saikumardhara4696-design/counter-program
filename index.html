<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: 'center';
            height: 100vh;
            width: 100%;
            background-color: #958b8b;
        }

        #content {
            display: 'block';
            font-size: 10em;
            margin-bottom: 20px;
        }

        .buttons {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="container">
        <div id="content">
            0
        </div>
        <div class="buttons">
            <button id="increasebtn" onclick="handleIncrease(1)">Increase + 1</button>
            <button id="reset" onclick="handleReset()">Reset</button>
            <button id="decreasebtn" onclick="handleDecrease(1)">Decrease - 1</button>
        </div>
    </div>
    <script>
        let total = 0;
        function handleIncrease(value) {
            total += value;
            document.getElementById("content").textContent = total;
        }
        function handleReset() {
            total = 0;
            document.getElementById("content").textContent = total;
        }
        function handleDecrease(value) {
            total -= value;
            document.getElementById("content").textContent = total;
        }
    </script>
</body>

</html>
